<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ibmec Campus – Gestão de Salas</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --navy:#002454;
    --navy-light:#003070;
    --navy-dark:#001a3a;
    --gold:#f5ac00;
    --gold-light:#ffd24d;
    --gold-pale:#fff8e6;
    --white:#ffffff;
    --gray-50:#f8f9fb;
    --gray-100:#eef0f5;
    --gray-200:#dde1eb;
    --gray-400:#9aa3b5;
    --gray-600:#5c6478;
    --gray-800:#2d3346;
    --success:#16a34a;
    --danger:#dc2626;
    --warning:#d97706;
    --info:#2563eb;
  }
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;}
  h1,h2,h3,h4,h5{font-family:'Sora',sans-serif;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'IBM Plex Sans',sans-serif;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-light);}
  .btn-gold{background:var(--gold);color:var(--navy);}
  .btn-gold:hover{background:var(--gold-light);}
  .btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy);}
  .btn-ghost:hover{background:var(--navy);color:#fff;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .card{background:#fff;border-radius:12px;border:1px solid var(--gray-200);padding:20px;}
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;}
  .badge-navy{background:var(--navy);color:#fff;}
  .badge-gold{background:var(--gold);color:var(--navy);}
  .badge-success{background:#dcfce7;color:#15803d;}
  .badge-danger{background:#fee2e2;color:#b91c1c;}
  .badge-warning{background:#fef3c7;color:#b45309;}
  .badge-gray{background:var(--gray-100);color:var(--gray-600);}
  .input{width:100%;padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:border .15s;background:#fff;}
  .input:focus{border-color:var(--navy);}
  .label{font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:4px;display:block;letter-spacing:.4px;text-transform:uppercase;}
  .tag-turma{display:inline-flex;align-items:center;background:var(--navy);color:#fff;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;}
  .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:14px;color:rgba(255,255,255,.75);transition:all .15s;white-space:nowrap;}
  .sidebar-item:hover,.sidebar-item.active{background:rgba(255,255,255,.12);color:#fff;}
  .sidebar-item svg{width:18px;height:18px;flex-shrink:0;}
  input[type=file]{display:none;}
  .upload-area{border:2px dashed var(--gray-200);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;}
  .upload-area:hover{border-color:var(--navy);background:rgba(0,36,84,.03);}
  .table-container{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:var(--gray-50);padding:10px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--gray-600);text-transform:uppercase;border-bottom:2px solid var(--gray-200);}
  td{padding:10px 12px;border-bottom:1px solid var(--gray-100);vertical-align:middle;}
  tr:hover td{background:var(--gray-50);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
  .toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:2000;box-shadow:0 4px 20px rgba(0,0,0,.15);display:flex;align-items:center;gap:10px;}
  .toast-success{background:var(--success);color:#fff;}
  .toast-error{background:var(--danger);color:#fff;}
  .scroll-area{overflow-y:auto;max-height:calc(100vh - 160px);}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:3px;}
  .loading-spin{animation:spin 1s linear infinite;display:inline-block;}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .grid-salas{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .sala-card{background:#fff;border-radius:12px;border:1px solid var(--gray-200);overflow:hidden;}
  .sala-header{background:var(--navy);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
  .sala-body{padding:12px 16px;}
  .aula-item{padding:10px;border-radius:8px;background:var(--gray-50);margin-bottom:8px;border-left:3px solid var(--gold);}
  .aula-item.cancelado{opacity:.55;border-left-color:var(--danger);}
  .aula-item.cancelado-def{opacity:.4;border-left-color:#888;text-decoration:line-through;}
  .dia-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
  .dia-tab{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);transition:all .15s;}
  .dia-tab.active{background:var(--navy);border-color:var(--navy);color:#fff;}
  .dia-tab:hover:not(.active){border-color:var(--navy);color:var(--navy);}
  .stat-box{background:#fff;border-radius:12px;border:1px solid var(--gray-200);padding:20px;display:flex;flex-direction:column;gap:4px;}
  .stat-num{font-family:'Sora',sans-serif;font-size:32px;font-weight:700;color:var(--navy);}
  .stat-label{font-size:12px;color:var(--gray-400);font-weight:500;}
  .horario-slot{background:var(--gray-50);border-radius:8px;padding:8px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;}
  .horario-time{font-weight:700;color:var(--navy);font-size:13px;min-width:60px;}
  @media(max-width:768px){
    .sidebar-collapsed{display:none;}
    .grid-salas{grid-template-columns:1fr;}
  }
</style>
</head>

<div id="root"></div>

const supabase = supabase_js.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Helpers ────────────────────────────────────────────────────────
const CURSO_MAP = {
  'ADMINISTRAÇÃO':'ADM',
  'CIÊNCIA DE DADOS E INTELIGÊNCIA ARTIFICIAL':'CN E IA',
  'CIÊNCIAS ECONÔMICAS':'ECO',
  'ENGENHARIA DE COMPUTAÇÃO':'ENG COMP',
  'ENGENHARIA DE PRODUÇÃO':'ENG PROD',
  'ENGENHARIA DE SOFTWARE':'ENG SOFT',
};
function abrevCurso(c){
  if(!c) return c||'';
  const up=c.toUpperCase().trim();
  return CURSO_MAP[up]||c;
}
function buildCodigo(row){
  const periodo=(row['PERÍODO']||'').toString().replace(/[ºo°]/g,'').trim()+'º';
  const curso=abrevCurso(row['CURSO']||'');
  const turma=(row['TURMA']||'').toString().trim();
  const grupo=(row['GRUPO']||'').toString().trim();
  return `${periodo} ${curso} ${turma} ${grupo}`.trim();
}
function normalize(s){return (s||'').toString().trim().toUpperCase();}
const DIAS=['SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO','DOMINGO'];
const DIAS_LABEL={'SEGUNDA':'Seg','TERÇA':'Ter','QUARTA':'Qua','QUINTA':'Qui','SEXTA':'Sex','SÁBADO':'Sáb','DOMINGO':'Dom'};
const DIAS_FULL={'SEGUNDA':'Segunda-feira','TERÇA':'Terça-feira','QUARTA':'Quarta-feira','QUINTA':'Quinta-feira','SEXTA':'Sexta-feira','SÁBADO':'Sábado','DOMINGO':'Domingo'};
function todayDia(){
  const d=new Date().getDay();// 0=Sun
  const map={0:'DOMINGO',1:'SEGUNDA',2:'TERÇA',3:'QUARTA',4:'QUINTA',5:'SEXTA',6:'SÁBADO'};
  return map[d]||'SEGUNDA';
}

// ── XLSX parser ────────────────────────────────────────────────────
function parseAlocacao(buffer){
  const wb=XLSX.read(buffer,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(ws,{defval:''});
  return raw;
}
function parseEventos(buffer){
  const wb=XLSX.read(buffer,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(ws,{defval:''});
  return raw;
}

  Settings:()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,

// ── Toast ──────────────────────────────────────────────────────────
function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t);},[]);
  return <div className={`toast toast-${type}`}>{type==='success'?<Icon.Check/>:<Icon.X/>}{msg}</div>;
}

// ── Login Page ─────────────────────────────────────────────────────
function LoginPage({onLogin}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  async function handleSubmit(e){
    e.preventDefault();
    setLoading(true); setErr('');
    try{
      const {data,error}=await supabase.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
      onLogin(data.user);
    }catch(e){setErr(e.message||'Erro ao entrar');}
    setLoading(false);
  }

  return(
    <div style={{minHeight:'100vh',background:`linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,#003a8c 100%)`,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:420}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:12,background:'rgba(255,255,255,.1)',padding:'12px 24px',borderRadius:12,marginBottom:20}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:'var(--gold)'}}/>
            <span style={{fontFamily:'Sora',fontWeight:700,fontSize:28,color:'#fff',letterSpacing:'-0.5px'}}>ibmec</span>
          </div>
          <h1 style={{color:'#fff',fontSize:20,fontWeight:600,marginBottom:6}}>Gestão de Campus</h1>
          <p style={{color:'rgba(255,255,255,.55)',fontSize:14}}>Acesse sua conta para continuar</p>
        </div>
        <div style={{background:'rgba(255,255,255,.07)',backdropFilter:'blur(12px)',borderRadius:16,padding:32,border:'1px solid rgba(255,255,255,.12)'}}>
          <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:16}}>
            <div>
              <label className="label" style={{color:'rgba(255,255,255,.7)'}}>E-mail</label>
              <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" style={{background:'rgba(255,255,255,.08)',border:'1.5px solid rgba(255,255,255,.15)',color:'#fff'}} required/>
            </div>
            <div>
              <label className="label" style={{color:'rgba(255,255,255,.7)'}}>Senha</label>
              <div style={{position:'relative'}}>
                <input className="input" type={showPass?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" style={{background:'rgba(255,255,255,.08)',border:'1.5px solid rgba(255,255,255,.15)',color:'#fff',paddingRight:42}} required/>
                <button type="button" onClick={()=>setShowPass(!showPass)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,.5)',display:'flex'}}>
                  {showPass?<Icon.EyeOff/>:<Icon.Eye/>}
                </button>
              </div>
            </div>
            {err&&<div style={{background:'rgba(220,38,38,.15)',border:'1px solid rgba(220,38,38,.3)',color:'#fca5a5',padding:'10px 14px',borderRadius:8,fontSize:13}}>{err}</div>}
            <button type="submit" className="btn btn-gold" style={{width:'100%',justifyContent:'center',padding:'12px',fontSize:15,marginTop:4}} disabled={loading}>
              {loading?<span className="loading-spin">↻</span>:'Entrar'}
            </button>
          </form>
        </div>
        <p style={{textAlign:'center',color:'rgba(255,255,255,.3)',fontSize:12,marginTop:20}}>
          Ibmec Campus System © {new Date().getFullYear()}
        </p>
      </div>
    </div>
  );
}

// ── Sidebar ────────────────────────────────────────────────────────
function Sidebar({page,setPage,isAdmin,onLogout,collapsed}){
  const items=[
    {id:'dashboard',label:'Dashboard',icon:'Home'},
    {id:'salas',label:'Salas Hoje',icon:'Grid'},
    {id:'grade',label:'Grade Semanal',icon:'Calendar'},
    {id:'eventos',label:'Eventos',icon:'Bell'},
    ...(isAdmin?[
      {id:'planilhas',label:'Planilhas',icon:'Upload'},
      {id:'usuarios',label:'Usuários',icon:'Users'},
      {id:'relatorios',label:'Relatórios',icon:'Chart'},
      {id:'configuracoes',label:'Configurações',icon:'Settings'},
    ]:[]),
  ];
  return(
    <div style={{width:collapsed?64:220,background:' var(--navy)',display:'flex',flexDirection:'column',height:'100vh',position:'fixed',left:0,top:0,zIndex:100,transition:'width .2s',flexShrink:0}}>
      <div style={{padding:'20px 14px',borderBottom:'1px solid rgba(255,255,255,.1)'}}>
        {!collapsed&&<div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:'var(--gold)'}}/>

// ── Dashboard ──────────────────────────────────────────────────────
function Dashboard({aulas,eventos,cancelamentos}){
  const hoje=todayDia();
  const aulasHoje=aulas.filter(a=>normalize(a['DIA DA SEMANA'])===normalize(hoje));
  const salasUnicas=[...new Set(aulas.map(a=>a['SALA']).filter(Boolean))];
  const profs=[...new Set(aulas.map(a=>a['PROFESSOR']).filter(Boolean))];
  const eventosHoje=eventos.filter(e=>{
    const d=e['Data']||e['DATA']||'';
    if(!d) return false;
    const ed=new Date(d);
    const nd=new Date();
    return ed.toDateString()===nd.toDateString();
  });
  const now=new Date();
  const horaAtual=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const aulasAoVivo=aulasHoje.filter(a=>{
    const h=a['HORÁRIO']||'';
    const parts=h.split('-');
    if(parts.length<2) return false;
    const ini=parts[0].trim();
    const fim=parts[1].trim();
    return ini<=horaAtual&&horaAtual<=fim;
  });

  return(
    <div>
      <h2 style={{marginBottom:20,fontSize:22,color:'var(--navy)'}}>Dashboard</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:16,marginBottom:28}}>
        {[
          {num:salasUnicas.length,label:'Total de Salas',color:'var(--navy)'},
          {num:aulasHoje.length,label:'Aulas Hoje',color:'var(--navy)'},
          {num:aulasAoVivo.length,label:'Aulas ao Vivo',color:'var(--success)'},
          {num:profs.length,label:'Professores',color:'var(--navy)'},
          {num:eventos.length,label:'Eventos Cadastrados',color:'var(--gold)'},
          {num:cancelamentos.length,label:'Cancelamentos',color:'var(--danger)'},
        ].map((s,i)=>(
          <div key={i} className="stat-box">
            <div className="stat-num" style={{color:s.color}}>{s.num}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <h3 style={{fontSize:15,marginBottom:14,color:'var(--navy)'}}>Aulas ao Vivo Agora</h3>
          {aulasAoVivo.length===0?<p style={{color:'var(--gray-400)',fontSize:14}}>Nenhuma aula em andamento</p>:
          aulasAoVivo.slice(0,6).map((a,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--gray-100)'}}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{a['SALA']}</div>
                <div style={{fontSize:12,color:'var(--gray-600)'}}>{a['DISCIPLINA']}</div>
              </div>
              <span className="badge badge-success">Ao vivo</span>
            </div>
          ))}
        </div>
        <div className="card">
          <h3 style={{fontSize:15,marginBottom:14,color:'var(--navy)'}}>Próximos Eventos</h3>
          {eventos.length===0?<p style={{color:'var(--gray-400)',fontSize:14}}>Nenhum evento cadastrado</p>:
          eventos.slice(0,5).map((e,i)=>(
            <div key={i} style={{padding:'8px 0',borderBottom:'1px solid var(--gray-100)'}}>
              <div style={{fontSize:13,fontWeight:600}}>{e['Nome do Evento']||e['NOME DO EVENTO']||'Evento'}</div>
              <div style={{fontSize:12,color:'var(--gray-400)'}}>{e['Data']||e['DATA']||''} · {e['Sala']||e['SALA']||''}</div>

          ))}
        </div>
      </div>
    </div>
  );
}

// ── Salas Hoje ─────────────────────────────────────────────────────
function SalasHoje({aulas,eventos,cancelamentos}){
  const [dia,setDia]=useState(todayDia());
  const [busca,setBusca]=useState('');
  const [viewMode,setViewMode]=useState('sala');// sala | lista

  const isCancelado=(row,tipo)=>cancelamentos.some(c=>
    normalize(c.sala)===normalize(row['SALA'])&&
    normalize(c.horario)===normalize(row['HORÁRIO'])&&
    normalize(c.dia)===normalize(row['DIA DA SEMANA'])&&
    (tipo?c.tipo===tipo:true)
  );

  const aulasDia=useMemo(()=>{
    const list=aulas.filter(a=>normalize(a['DIA DA SEMANA'])===normalize(dia));
    // group by SALA+HORARIO+DISCIPLINA for concatenation
    const map=new Map();
    list.forEach(row=>{
      const key=`${normalize(row['SALA'])}|${normalize(row['HORÁRIO'])}|${normalize(row['DISCIPLINA'])}`;
      if(!map.has(key)) map.set(key,{...row,_codigos:[buildCodigo(row)],_cancelado:isCancelado(row,'semana'),_canceladoDef:isCancelado(row,'definitivo')});
      else{
        const ex=map.get(key);
        const cod=buildCodigo(row);
        if(!ex._codigos.includes(cod)) ex._codigos.push(cod);
      }
    });
    return [...map.values()].filter(a=>{
      if(!busca) return true;
      const b=busca.toLowerCase();
      return (a['SALA']||'').toLowerCase().includes(b)||(a['DISCIPLINA']||'').toLowerCase().includes(b)||(a['PROFESSOR']||'').toLowerCase().includes(b)||a._codigos.join(' ').toLowerCase().includes(b);
    });
  },[aulas,dia,busca,cancelamentos]);

  const bySala=useMemo(()=>{
    const m=new Map();
    aulasDia.forEach(a=>{
      const sala=a['SALA']||'Sem sala';
      if(!m.has(sala)) m.set(sala,[]);
      m.get(sala).push(a);
    });
    return m;
  },[aulasDia]);

  // eventos do dia
  const eventosDia=useMemo(()=>eventos.filter(e=>{
    const dds=normalize(e['Dia da Semana']||e['DIA DA SEMANA']||'');
    return dds===normalize(dia)||dds===normalize(DIAS_LABEL[dia]||'');
  }),[eventos,dia]);

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <h2 style={{fontSize:22,color:'var(--navy)'}}>Rotina do Campus</h2>
        <div style={{display:'flex',gap:8}}>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--gray-400)',display:'flex'}}><Icon.Search/></span>
            <input className="input" value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar sala, disciplina..." style={{paddingLeft:36,width:220}}/>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>setViewMode(viewMode==='sala'?'lista':'sala')}>
            {viewMode==='sala'?'Ver lista':'Ver por sala'}
          </button>
        </div>
      </div>
      <div className="dia-tabs">
        {DIAS.map(d=>(
          <div key={d} className={`dia-tab${dia===d?' active':''}`} onClick={()=>setDia(d)}>
            {DIAS_FULL[d]}
          </div>
        ))}
      </div>

      {eventosDia.length>0&&(
        <div style={{marginBottom:20}}>
          <h3 style={{fontSize:14,fontWeight:600,color:'var(--gray-600)',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Eventos do Dia</h3>
          <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
            {eventosDia.map((ev,i)=>(
              <div key={i} style={{background:'var(--gold-pale)',border:'1.5px solid var(--gold)',borderRadius:10,padding:'10px 14px',minWidth:200}}>
                <div style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{ev['Nome do Evento']||'Evento'}</div>
                <div style={{fontSize:12,color:'var(--gray-600)',marginTop:2}}>{ev['Sala']||ev['SALA']||''} · {ev['Horário Inicio']||''} - {ev['Horario Termino']||''}</div>
                {ev['Responsável Reserva']&&<div style={{fontSize:12,color:'var(--gray-400)'}}>{ev['Responsável Reserva']}</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {viewMode==='sala'?(
        <div className="grid-salas">
          {[...bySala.entries()].sort((a,b)=>a[0]>b[0]?1:-1).map(([sala,aulasList])=>(
            <div key={sala} className="sala-card">
              <div className="sala-header">
                <span style={{fontFamily:'Sora',fontWeight:700,fontSize:16}}>{sala}</span>
                <span className="badge" style={{background:'rgba(255,255,255,.2)',color:'#fff',fontSize:11}}>{aulasList.length} aula{aulasList.length!==1?'s':''}</span>
              </div>
              <div className="sala-body">
                {aulasList.sort((a,b)=>(a['HORÁRIO']||'')>(b['HORÁRIO']||'')?1:-1).map((a,i)=>{
                  const cls=a._canceladoDef?'cancelado-def':a._cancelado?'cancelado':'';
                  return(
                    <div key={i} className={`aula-item ${cls}`}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}}>
                        <span style={{fontSize:12,fontWeight:700,color:'var(--navy)'}}>{a['HORÁRIO']}</span>
                        {a._cancelado&&!a._canceladoDef&&<span className="badge badge-warning" style={{fontSize:10}}>Cancelado</span>}
                        {a._canceladoDef&&<span className="badge badge-danger" style={{fontSize:10}}>Cancelado Def.</span>}
                      </div>
                      <div style={{fontSize:13,fontWeight:600,color:'var(--gray-800)',marginBottom:4}}>{a['DISCIPLINA']}</div>
                      <div style={{fontSize:12,color:'var(--gray-600)',marginBottom:6}}>{a['PROFESSOR']}</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                        {a._codigos.map((c,ci)=><span key={ci} className="tag-turma">{c}</span>)}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          {bySala.size===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:60,color:'var(--gray-400)'}}>Nenhuma aula encontrada</div>}
        </div>
      ):(
        <div className="card">
          <div className="table-container">
            <table>
              <thead><tr><th>Sala</th><th>Horário</th><th>Disciplina</th><th>Professor</th><th>Turmas</th><th>Status</th></tr></thead>
              <tbody>
                {aulasDia.sort((a,b)=>(a['HORÁRIO']||'')>(b['HORÁRIO']||'')?1:-1).map((a,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:600}}>{a['SALA']}</td>
                    <td><span className="badge badge-navy">{a['HORÁRIO']}</span></td>
                    <td>{a['DISCIPLINA']}</td>
                    <td style={{color:'var(--gray-600)'}}>{a['PROFESSOR']}</td>
                    <td><div style={{display:'flex',flexWrap:'wrap',gap:4}}>{a._codigos.map((c,ci)=><span key={ci} className="tag-turma">{c}</span>)}</div></td>
                    <td>{a._canceladoDef?<span className="badge badge-danger">Cancelado Def.</span>:a._cancelado?<span className="badge badge-warning">Cancelado</span>:<span className="badge badge-success">Normal</span>}</td>
                  </tr>
                ))}
                {aulasDia.length===0&&<tr><td colSpan={6} style={{textAlign:'center',padding:40,color:'var(--gray-400)'}}>Nenhuma aula encontrada</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Grade Semanal ──────────────────────────────────────────────────
function GradeSemanal({aulas,cancelamentos}){
  const [sala,setSala]=useState('');
  const salas=[...new Set(aulas.map(a=>a['SALA']).filter(Boolean))].sort();
  const isCancelado=(row)=>cancelamentos.some(c=>
    normalize(c.sala)===normalize(row['SALA'])&&
    normalize(c.horario)===normalize(row['HORÁRIO'])&&
    normalize(c.dia)===normalize(row['DIA DA SEMANA'])
  );

  const aulasFiltradas=useMemo(()=>{
    const map=new Map();
    aulas.filter(a=>!sala||normalize(a['SALA'])===normalize(sala)).forEach(row=>{
      const key=`${normalize(row['SALA'])}|${normalize(row['DIA DA SEMANA'])}|${normalize(row['HORÁRIO'])}|${normalize(row['DISCIPLINA'])}`;
      if(!map.has(key)) map.set(key,{...row,_codigos:[buildCodigo(row)],_cancelado:isCancelado(row)});
      else map.get(key)._codigos.push(buildCodigo(row));
    });
    return [...map.values()];
  },[aulas,sala,cancelamentos]);

  const horarios=[...new Set(aulasFiltradas.map(a=>a['HORÁRIO']).filter(Boolean))].sort();
  const diasUsados=DIAS.filter(d=>aulasFiltradas.some(a=>normalize(a['DIA DA SEMANA'])===normalize(d)));

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <h2 style={{fontSize:22,color:'var(--navy)'}}>Grade Semanal</h2>
        <select className="input" value={sala} onChange={e=>setSala(e.target.value)} style={{width:'auto',minWidth:160}}>
          <option value="">Todas as salas</option>
          {salas.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>
      <div style={{overflowX:'auto'}}>
        <table style={{minWidth:700}}>
          <thead>
            <tr>
              <th style={{minWidth:80}}>Horário</th>
              {diasUsados.map(d=><th key={d} style={{minWidth:130}}>{DIAS_FULL[d]}</th>)}
            </tr>
          </thead>
          <tbody>
            {horarios.map(h=>(
              <tr key={h}>
                <td style={{fontWeight:700,color:'var(--navy)',verticalAlign:'top',whiteSpace:'nowrap'}}>{h}</td>
                {diasUsados.map(d=>{
                  const items=aulasFiltradas.filter(a=>normalize(a['HORÁRIO'])===normalize(h)&&normalize(a['DIA DA SEMANA'])===normalize(d));
                  return(
                    <td key={d} style={{verticalAlign:'top'}}>
                      {items.map((a,i)=>(
                        <div key={i} style={{marginBottom:6,padding:'6px 8px',borderRadius:6,background:a._cancelado?'#fee2e2':'#eff6ff',borderLeft:`3px solid ${a._cancelado?'var(--danger)':'var(--info)'}`,opacity:a._cancelado?.55:1}}>
                          {!sala&&<div style={{fontSize:11,fontWeight:700,color:'var(--gray-400)'}}>{a['SALA']}</div>}
                          <div style={{fontSize:12,fontWeight:600,color:'var(--gray-800)'}}>{a['DISCIPLINA']}</div>
                          <div style={{fontSize:11,color:'var(--gray-600)'}}>{a['PROFESSOR']}</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:2,marginTop:3}}>
                            {a._codigos.map((c,ci)=><span key={ci} style={{fontSize:10,background:'var(--navy)',color:'#fff',padding:'1px 5px',borderRadius:4}}>{c}</span>)}
                          </div>
                        </div>
                      ))}
                    </td>
                  );
                })}
              </tr>
            ))}
            {horarios.length===0&&<tr><td colSpan={diasUsados.length+1} style={{textAlign:'center',padding:40,color:'var(--gray-400)'}}>Nenhuma aula encontrada</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Planilhas ──────────────────────────────────────────────────────
function Planilhas({onAlocacaoUpload,onEventosUpload,toast}){
  const alocRef=useRef();
  const evRef=useRef();
  const [loadingAloc,setLoadingAloc]=useState(false);
  const [loadingEv,setLoadingEv]=useState(false);
  const [cancelModal,setCancelModal]=useState(false);
  const [cancelData,setCancelData]=useState({sala:'',dia:'',horario:'',tipo:'semana'});
  const [aulas,setAulas]=useState([]);

  // load stored alocacao to allow cancelation
  useEffect(()=>{
    supabase.from('alocacao').select('*').limit(500).then(({data})=>{if(data)setAulas(data);});
  },[]);

  async function handleAloc(e){
    const file=e.target.files[0]; if(!file) return;
    setLoadingAloc(true);
    const buf=await file.arrayBuffer();
    const rows=parseAlocacao(new Uint8Array(buf));
    // save to supabase
    const mapped=rows.map(r=>({
      num_seq:r['NUM_SEQ_TURMA']||'',
      unidade:r['UNIDADE']||'',
      curso:r['CURSO']||'',
      periodo:String(r['PERÍODO']||''),
      turma:r['TURMA']||'',
      grupo:r['GRUPO']||'',
      codigo:r['CÓDIGO']||'',
      disciplina:r['DISCIPLINA']||'',
      professor:r['PROFESSOR']||'',
      dia_semana:r['DIA DA SEMANA']||'',
      horario:r['HORÁRIO']||'',
      sala:r['SALA']||'',
      capacidade:r['CAPACIDADE']||'',
      raw:r,
    }));
    await supabase.from('alocacao').delete().neq('id',0);
    const {error}=await supabase.from('alocacao').insert(mapped);
    if(!error){toast('Planilha de alocação importada com sucesso!','success');onAlocacaoUpload(rows);}
    else toast('Erro ao importar: '+error.message,'error');
    setLoadingAloc(false);
  }

  async function handleEv(e){
    const file=e.target.files[0]; if(!file) return;
    setLoadingEv(true);
    const buf=await file.arrayBuffer();
    const rows=parseEventos(new Uint8Array(buf));
    const mapped=rows.map(r=>({raw:r,...r}));
    await supabase.from('eventos').delete().neq('id',0);
    const {error}=await supabase.from('eventos').insert(rows.map(r=>({
      data:String(r['Data']||r['DATA']||''),
      dia_semana:r['Dia da Semana']||r['DIA DA SEMANA']||'',
      nome:r['Nome do Evento']||r['NOME DO EVENTO']||'',
      responsavel:r['Responsável Reserva']||'',
      sala:r['Sala']||r['SALA']||'',
      capacidade:String(r['Capacidade']||r['CAPACIDADE']||''),
      horario_inicio:r['Horário Inicio']||'',
      horario_termino:r['Horario Termino']||'',
      observacoes:r['Observações']||'',
      assistente:r['Assistente/Supervisão']||'',
    })));
    if(!error){toast('Planilha de eventos importada!','success');onEventosUpload(rows);}
    else toast('Erro ao importar: '+error.message,'error');
    setLoadingEv(false);
  }

  async function saveCancelamento(){
    const {error}=await supabase.from('cancelamentos').insert([cancelData]);
    if(!error){toast('Cancelamento registrado!','success');setCancelModal(false);setCancelData({sala:'',dia:'',horario:'',tipo:'semana'});}
    else toast(error.message,'error');
  }

  return(
    <div>
      <h2 style={{marginBottom:20,fontSize:22,color:'var(--navy)'}}>Gerenciar Planilhas</h2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:24}}>
        <div className="card">
          <h3 style={{fontSize:16,marginBottom:4,color:'var(--navy)'}}>Planilha de Alocação de Salas</h3>
          <p style={{fontSize:13,color:'var(--gray-400)',marginBottom:16}}>Substitui a grade de aulas atual. Aceita .xlsx e .xls</p>
          <div className="upload-area" onClick={()=>alocRef.current.click()}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
              <span style={{color:'var(--navy)',display:'block'}}><Icon.Upload/></span>
              <span style={{fontSize:14,color:'var(--gray-600)'}}>Clique para selecionar arquivo</span>
              <span style={{fontSize:12,color:'var(--gray-400)'}}>xlsx · xls</span>
            </div>
          </div>
          <input ref={alocRef} type="file" accept=".xlsx,.xls" onChange={handleAloc}/>
          {loadingAloc&&<p style={{textAlign:'center',marginTop:10,color:'var(--gray-400)',fontSize:13}}><span className="loading-spin">↻</span> Processando...</p>}
        </div>
        <div className="card">
          <h3 style={{fontSize:16,marginBottom:4,color:'var(--navy)'}}>Planilha de Eventos</h3>
          <p style={{fontSize:13,color:'var(--gray-400)',marginBottom:16}}>Atualizada automaticamente a cada hora. Aceita .xlsx e .xls</p>
          <div className="upload-area" onClick={()=>evRef.current.click()}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
              <span style={{color:'var(--gold)',display:'block'}}><Icon.Upload/></span>
              <span style={{fontSize:14,color:'var(--gray-600)'}}>Clique para selecionar arquivo</span>
              <span style={{fontSize:12,color:'var(--gray-400)'}}>xlsx · xls</span>
            </div>
          </div>
          <input ref={evRef} type="file" accept=".xlsx,.xls" onChange={handleEv}/>
          {loadingEv&&<p style={{textAlign:'center',marginTop:10,color:'var(--gray-400)',fontSize:13}}><span className="loading-spin">↻</span> Processando...</p>}
        </div>
      </div>

      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style={{fontSize:16,color:'var(--navy)'}}>Cancelamentos de Aulas</h3>
          <button className="btn btn-danger btn-sm" onClick={()=>setCancelModal(true)}><Icon.Plus/>Registrar Cancelamento</button>
        </div>
        <p style={{fontSize:13,color:'var(--gray-400)'}}>Cancele uma aula para uma semana específica ou definitivamente.</p>
      </div>

      {cancelModal&&(
        <div className="modal-overlay">
          <div className="modal">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
              <h3 style={{color:'var(--navy)'}}>Registrar Cancelamento</h3>
              <button className="btn btn-ghost btn-sm" onClick={()=>setCancelModal(false)}><Icon.X/></button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div><label className="label">Sala</label>
                <input className="input" value={cancelData.sala} onChange={e=>setCancelData({...cancelData,sala:e.target.value})} placeholder="Ex: SALA 101"/>
              </div>
              <div><label className="label">Dia da Semana</label>
                <select className="input" value={cancelData.dia} onChange={e=>setCancelData({...cancelData,dia:e.target.value})}>
                  <option value="">Selecione...</option>
                  {DIAS.map(d=><option key={d} value={d}>{DIAS_FULL[d]}</option>)}
                </select>
              </div>
              <div><label className="label">Horário</label>
                <input className="input" value={cancelData.horario} onChange={e=>setCancelData({...cancelData,horario:e.target.value})} placeholder="Ex: 07:30 - 09:10"/>
              </div>
              <div><label className="label">Tipo</label>
                <select className="input" value={cancelData.tipo} onChange={e=>setCancelData({...cancelData,tipo:e.target.value})}>
                  <option value="semana">Cancelado (só esta semana)</option>
                  <option value="definitivo">Cancelado Definitivamente</option>
                </select>
              </div>
              <button className="btn btn-danger" style={{marginTop:8}} onClick={saveCancelamento}>Confirmar Cancelamento</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Usuários ───────────────────────────────────────────────────────
function Usuarios({toast,currentUser}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({email:'',password:'',role:'user'});
  const [saving,setSaving]=useState(false);

  async function loadUsers(){
    setLoading(true);
    const {data}=await supabase.from('user_profiles').select('*').order('created_at',{ascending:false});
    setUsers(data||[]);
    setLoading(false);
  }
  useEffect(()=>{loadUsers();},[]);

  async function createUser(){
    setSaving(true);
    // Create via admin edge function (Supabase requires admin SDK to create users)
    // Fallback: use signUp (email confirmation may be needed)
    const {data,error}=await supabase.auth.signUp({email:form.email,password:form.password});
    if(error){toast(error.message,'error');setSaving(false);return;}
    // Insert profile
    await supabase.from('user_profiles').insert([{id:data.user?.id,email:form.email,role:form.role}]);
    toast('Usuário criado com sucesso!','success');
    setModal(false);setForm({email:'',password:'',role:'user'});
    loadUsers();setSaving(false);
  }

  async function changeRole(id,role){
    await supabase.from('user_profiles').update({role}).eq('id',id);
    toast('Papel atualizado!','success');loadUsers();
  }

  async function deleteUser(id){
    if(!confirm('Remover usuário?')) return;
    await supabase.from('user_profiles').delete().eq('id',id);
    toast('Usuário removido','success');loadUsers();
  }

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <h2 style={{fontSize:22,color:'var(--navy)'}}>Usuários</h2>
        <button className="btn btn-gold" onClick={()=>setModal(true)}><Icon.Plus/>Novo Usuário</button>
      </div>
      <div className="card">
        {loading?<p style={{textAlign:'center',padding:40,color:'var(--gray-400)'}}>Carregando...</p>:(
          <div className="table-container">
            <table>
              <thead><tr><th>E-mail</th><th>Papel</th><th>Criado em</th><th>Ações</th></tr></thead>
              <tbody>
                {users.map(u=>(
                  <tr key={u.id}>
                    <td style={{fontWeight:500}}>{u.email}</td>
                    <td>
                      <select className="input" style={{width:'auto'}} value={u.role} onChange={e=>changeRole(u.id,e.target.value)}>
                        <option value="user">Usuário</option>
                        <option value="sub-admin">Sub-Admin</option>
                        <option value="admin">Admin</option>
                      </select>
                    </td>
                    <td style={{color:'var(--gray-400)',fontSize:12}}>{new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
                    <td>
                      {u.id!==currentUser?.id&&<button className="btn btn-danger btn-sm" onClick={()=>deleteUser(u.id)}><Icon.Trash/></button>}
                    </td>
                  </tr>
                ))}
                {users.length===0&&<tr><td colSpan={4} style={{textAlign:'center',padding:40,color:'var(--gray-400)'}}>Nenhum usuário cadastrado</td></tr>}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modal&&(
        <div className="modal-overlay">
          <div className="modal">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
              <h3 style={{color:'var(--navy)'}}>Novo Usuário</h3>
              <button className="btn btn-ghost btn-sm" onClick={()=>setModal(false)}><Icon.X/></button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div><label className="label">E-mail</label>
                <input className="input" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@ibmec.edu.br"/>
              </div>
              <div><label className="label">Senha</label>
                <input className="input" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Mínimo 6 caracteres"/>
              </div>
              <div><label className="label">Papel</label>
                <select className="input" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                  <option value="user">Usuário</option>
                  <option value="sub-admin">Sub-Admin</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button className="btn btn-primary" style={{marginTop:8}} onClick={createUser} disabled={saving}>
                {saving?'Criando...':'Criar Usuário'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Relatórios ─────────────────────────────────────────────────────
function Relatorios({aulas,eventos,cancelamentos}){
  const salasUnicas=[...new Set(aulas.map(a=>a['SALA']).filter(Boolean))];
  const profs=[...new Set(aulas.map(a=>a['PROFESSOR']).filter(Boolean))];
  const cursos=[...new Set(aulas.map(a=>a['CURSO']).filter(Boolean))];
  const aulasPerDia=DIAS.map(d=>({dia:DIAS_FULL[d],count:aulas.filter(a=>normalize(a['DIA DA SEMANA'])===normalize(d)).length}));
  const top5Salas=salasUnicas.map(s=>({sala:s,count:aulas.filter(a=>a['SALA']===s).length})).sort((a,b)=>b.count-a.count).slice(0,5);
  const max=Math.max(...top5Salas.map(s=>s.count),1);

  return(
    <div>
      <h2 style={{marginBottom:20,fontSize:22,color:'var(--navy)'}}>Relatórios</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:16,marginBottom:24}}>
        {[
          {num:salasUnicas.length,label:'Salas Cadastradas'},
          {num:profs.length,label:'Professores'},
          {num:cursos.length,label:'Cursos'},
          {num:aulas.length,label:'Total de Alocações'},
          {num:eventos.length,label:'Eventos'},
          {num:cancelamentos.length,label:'Cancelamentos'},
        ].map((s,i)=>(
          <div key={i} className="stat-box">
            <div className="stat-num">{s.num}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div className="card">
          <h3 style={{fontSize:15,marginBottom:16,color:'var(--navy)'}}>Aulas por Dia da Semana</h3>
          {aulasPerDia.map((d,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:13}}>{d.dia}</span>
                <span style={{fontSize:13,fontWeight:600,color:'var(--navy)'}}>{d.count}</span>
              </div>
              <div style={{background:'var(--gray-100)',borderRadius:4,height:8}}>
                <div style={{background:'var(--navy)',width:`${Math.round(d.count/Math.max(...aulasPerDia.map(x=>x.count),1)*100)}%`,height:'100%',borderRadius:4,transition:'width .3s'}}/>
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <h3 style={{fontSize:15,marginBottom:16,color:'var(--navy)'}}>Top 5 Salas Mais Ocupadas</h3>
          {top5Salas.map((s,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:600}}>{s.sala}</span>
                <span style={{fontSize:13,color:'var(--gray-600)'}}>{s.count} aulas/sem</span>
              </div>
              <div style={{background:'var(--gray-100)',borderRadius:4,height:8}}>
                <div style={{background:'var(--gold)',width:`${Math.round(s.count/max*100)}%`,height:'100%',borderRadius:4}}/>
              </div>
            </div>
          ))}
          {top5Salas.length===0&&<p style={{color:'var(--gray-400)',fontSize:14}}>Sem dados</p>}
        </div>
      </div>
    </div>
  );
}

// ── Modal Evento Manual ────────────────────────────────────────────
function ModalEvento({onClose,onSave,toast}){
  const [form,setForm]=useState({nome:'',data:'',sala:'',horarioInicio:'',horarioTermino:'',responsavel:'',observacoes:''});
  async function save(){
    const {error}=await supabase.from('eventos').insert([{
      nome:form.nome,data:form.data,sala:form.sala,
      horario_inicio:form.horarioInicio,horario_termino:form.horarioTermino,
      responsavel:form.responsavel,observacoes:form.observacoes,
    }]);
    if(error){toast(error.message,'error');}
    else{toast('Evento publicado!','success');onSave();onClose();}
  }
  return(
    <div className="modal-overlay">
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
          <h3 style={{color:'var(--navy)'}}>Publicar Evento</h3>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><Icon.X/></button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {[['Nome do Evento','nome','text'],['Data','data','date'],['Sala','sala','text'],['Horário Início','horarioInicio','time'],['Horário Término','horarioTermino','time'],['Responsável','responsavel','text']].map(([lbl,key,type])=>(
            <div key={key}>
              <label className="label">{lbl}</label>
              <input className="input" type={type} value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})}/>
            </div>
          ))}
          <div><label className="label">Observações</label>
            <textarea className="input" value={form.observacoes} onChange={e=>setForm({...form,observacoes:e.target.value})} rows={3} style={{resize:'vertical'}}/>
          </div>
          <button className="btn btn-gold" onClick={save}>Publicar Evento</button>
        </div>
      </div>
    </div>
  );
}

// ── Configurações ──────────────────────────────────────────────────
function Configuracoes({currentUser,toast}){
  const [senha,setSenha]=useState({atual:'',nova:'',confirma:''});
  const [loading,setLoading]=useState(false);

  async function changePass(){
    if(senha.nova!==senha.confirma){toast('As senhas não conferem','error');return;}
    setLoading(true);
    const {error}=await supabase.auth.updateUser({password:senha.nova});
    if(error) toast(error.message,'error');
    else{toast('Senha alterada com sucesso!','success');setSenha({atual:'',nova:'',confirma:''});}
    setLoading(false);
  }

  return(
    <div>
      <h2 style={{marginBottom:20,fontSize:22,color:'var(--navy)'}}>Configurações</h2>
      <div style={{maxWidth:480}}>
        <div className="card">
          <h3 style={{fontSize:16,marginBottom:16,color:'var(--navy)'}}>Alterar Senha</h3>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div><label className="label">Nova senha</label>
              <input className="input" type="password" value={senha.nova} onChange={e=>setSenha({...senha,nova:e.target.value})} placeholder="••••••••"/>
            </div>
            <div><label className="label">Confirmar nova senha</label>
              <input className="input" type="password" value={senha.confirma} onChange={e=>setSenha({...senha,confirma:e.target.value})} placeholder="••••••••"/>
            </div>
            <button className="btn btn-primary" onClick={changePass} disabled={loading}>
              {loading?'Salvando...':'Salvar Senha'}
            </button>
          </div>
        </div>
        <div className="card" style={{marginTop:16}}>
          <h3 style={{fontSize:16,marginBottom:8,color:'var(--navy)'}}>Informações da Conta</h3>
          <p style={{fontSize:14,color:'var(--gray-600)'}}>E-mail: <strong>{currentUser?.email}</strong></p>
          <p style={{fontSize:13,color:'var(--gray-400)',marginTop:4}}>ID: {currentUser?.id}</p>
        </div>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [userRole,setUserRole]=useState('user');
  const [aulas,setAulas]=useState([]);
  const [eventos,setEventos]=useState([]);
  const [cancelamentos,setCancelamentos]=useState([]);
  const [page,setPage]=useState('dashboard');
  const [toast,setToast]=useState(null);
  const [eventoModal,setEventoModal]=useState(false);
  const [sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const [loading,setLoading]=useState(true);

  function showToast(msg,type='success'){setToast({msg,type});}

  // check session
  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        setUser(session.user);
        loadProfile(session.user.id);
      }
      setLoading(false);
    });
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
      if(session?.user) loadProfile(session.user.id);
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function loadProfile(uid){
    const {data}=await supabase.from('user_profiles').select('role').eq('id',uid).single();
    setUserRole(data?.role||'user');
  }

  // load data
  useEffect(()=>{
    if(!user) return;
    loadAulas();loadEventos();loadCancelamentos();
    // reload eventos every hour
    const t=setInterval(loadEventos,3600000);
    return()=>clearInterval(t);
  },[user]);

  async function loadAulas(){
    const {data}=await supabase.from('alocacao').select('*');
    if(data) setAulas(data.map(d=>d.raw||{'DIA DA SEMANA':d.dia_semana,'HORÁRIO':d.horario,'SALA':d.sala,'DISCIPLINA':d.disciplina,'PROFESSOR':d.professor,'CURSO':d.curso,'PERÍODO':d.periodo,'TURMA':d.turma,'GRUPO':d.grupo,'CAPACIDADE':d.capacidade,...(d.raw||{})}));
  }
  async function loadEventos(){
    const {data}=await supabase.from('eventos').select('*').order('data',{ascending:true});
    if(data) setEventos(data.map(d=>({'Nome do Evento':d.nome,'Data':d.data,'Dia da Semana':d.dia_semana,'Sala':d.sala,'Horário Inicio':d.horario_inicio,'Horario Termino':d.horario_termino,'Responsável Reserva':d.responsavel,'Observações':d.observacoes})));
  }
  async function loadCancelamentos(){
    const {data}=await supabase.from('cancelamentos').select('*');
    if(data) setCancelamentos(data);
  }

  async function handleLogout(){
    await supabase.auth.signOut();
    setUser(null);setAulas([]);setEventos([]);
  }

  if(loading) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--navy)'}}>
      <div style={{textAlign:'center',color:'#fff'}}>
        <div style={{fontFamily:'Sora',fontSize:32,fontWeight:700,marginBottom:8}}>ibmec</div>
        <div className="loading-spin" style={{fontSize:24}}>↻</div>
      </div>
    </div>
  );

  if(!user) return <LoginPage onLogin={u=>{setUser(u);loadProfile(u.id);}}/>;

  const isAdmin=userRole==='admin'||userRole==='sub-admin';
  const sideW=sidebarCollapsed?64:220;

  function renderPage(){
    switch(page){
      case 'dashboard': return <Dashboard aulas={aulas} eventos={eventos} cancelamentos={cancelamentos}/>;
      case 'salas': return <SalasHoje aulas={aulas} eventos={eventos} cancelamentos={cancelamentos}/>;
      case 'grade': return <GradeSemanal aulas={aulas} cancelamentos={cancelamentos}/>;
      case 'eventos': return <Eventos eventos={eventos} isAdmin={isAdmin} onAddEvento={()=>setEventoModal(true)}/>;
      case 'planilhas': return isAdmin?<Planilhas onAlocacaoUpload={rows=>{setAulas(rows);loadAulas();}} onEventosUpload={rows=>{setEventos(rows);loadEventos();}} toast={showToast}/>:null;
      case 'usuarios': return isAdmin?<Usuarios toast={showToast} currentUser={user}/>:null;
      case 'relatorios': return isAdmin?<Relatorios aulas={aulas} eventos={eventos} cancelamentos={cancelamentos}/>:null;
      case 'configuracoes': return <Configuracoes currentUser={user} toast={showToast}/>;
      default: return <Dashboard aulas={aulas} eventos={eventos} cancelamentos={cancelamentos}/>;
    }
  }

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} setPage={setPage} isAdmin={isAdmin} onLogout={handleLogout} collapsed={sidebarCollapsed}/>
      <div style={{flex:1,marginLeft:sideW,transition:'margin .2s',display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        {/* Top bar */}
        <div style={{height:56,background:'#fff',borderBottom:'1px solid var(--gray-200)',display:'flex',alignItems:'center',padding:'0 24px',gap:12,position:'sticky',top:0,zIndex:50}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setSidebarCollapsed(!sidebarCollapsed)}>
            <Icon.Menu/>
          </button>
          <div style={{flex:1}}/>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span className={`badge badge-${userRole==='admin'?'navy':userRole==='sub-admin'?'gold':'gray'}`}>{userRole}</span>
            <span style={{fontSize:13,color:'var(--gray-600)'}}>{user.email}</span>
          </div>
        </div>
        {/* Content */}
        <div style={{flex:1,padding:28,overflowY:'auto'}}>
          {renderPage()}
        </div>
      </div>
      {eventoModal&&<ModalEvento onClose={()=>setEventoModal(false)} onSave={loadEventos} toast={showToast}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
